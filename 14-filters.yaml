- name: filters demo
  hosts: local
  connection: local
  tasks:
  - name: print the default variable
    ansible.builtin.debug:
      msg: "hello {{ course | default('ansible')}}"

  - name: convert to uppercase
    vars: 
      greetings: hello rama
    ansible.builtin.debug:
      msg: "{{ greetings | upper }}"
  - name: convert to uppercase
    vars: 
      greetings: hello rama
    ansible.builtin.debug:
      msg: "{{ greetings | lower }}"

  - name: get unique numbers
    vars: 
      number: [1,3,7,432,15]
    ansible.builtin.debug:
      msg: "{{ numbers | unique }}"
    