- name: connect ec2 and route 53
  hosts: local
  connection: local
  vars: 
    subnet_id: subnet-0e3040c530f5b9a8b 
    sg_id: "sg-071bf256e71173a9e"
    ami_id: "ami-0220d79f3f480ecf5"
    instances:
    - mysql
    - backend
    - frontend
    zone: devopsp.online
  tasks:
  - name: create ec2 instance
    amazon.aws.ec2_instance:
      name: "{{ item }}"
      vpc_subnet_id: "{{ subnet_id }}"
      instance_type: "t3.micro"
      security_group: "{{ sg_id }}"
      image_id: "{{ ami_id }}"
    loop: "{{ instances }}"
    register: "ec2-instance"

  - name: print the output
    ansible.builtin.debug:
      msg: "{{ ec2-instance }}"
  - name: create r53 records
    amazon.aws.route53:
      state: present
      zone: "{{ zone }}"
      record: "{{ item.item }}.{{ zone }}"
      type: A 
      ttl: 1
      value: "{{ item.instances[0].private_ip_address }}"
      wait: true
    loop: "{{ ec2-instance.results }}"