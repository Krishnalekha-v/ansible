- name: filters demo
  hosts: local
  connection: local
  tasks:
  - name: print the default variable
    ansible.builtin.debug:
      msg: "hello {{ course | default('ansible')}}"

  - name: convert to uppercase
    vars: hello rama
    ansible.builtin.debug:
      msg: "{{ greetings | upper }}"
  - name: convert to uppercase
    vars: hello rama
    ansible.builtin.debug:
      msg: "{{ greetings | lower }}"